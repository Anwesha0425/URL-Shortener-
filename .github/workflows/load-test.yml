name: Load Test (Scheduled)

on:
  schedule:
    - cron: '0 2 * * *'        # Run nightly at 2 AM UTC
  workflow_dispatch:             # Allow manual trigger
    inputs:
      target_url:
        description: 'Target URL for redirect service'
        default: 'https://sho.rt'
        required: true
      duration:
        description: 'Test duration (e.g. 5m)'
        default: '5m'
        required: true

jobs:
  load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.47.0/k6-v0.47.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.47.0-linux-amd64/k6 /usr/local/bin/k6

      - name: Run load test
        run: |
          k6 run \
            --env BASE_URL=${{ github.event.inputs.target_url || 'https://sho.rt' }} \
            --out json=load-test-results.json \
            scripts/load-test.js

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results-${{ github.run_id }}
          path: load-test-results.json
