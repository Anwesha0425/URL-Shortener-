_format_version: "3.0"
_transform: true

# ─────────────────────────────────────────────────────────────────
# Kong API Gateway — Declarative Configuration
#
# Plugins applied (in order):
#   1. CORS              — allow browser clients
#   2. Rate Limiting     — tier-based token bucket (via auth-service)
#   3. JWT               — verify access tokens
#   4. Request Logging   — structured access logs → Kafka
#   5. Prometheus        — expose /metrics
#   6. Response Transform— add X-Request-ID header
# ─────────────────────────────────────────────────────────────────

services:
  # ── URL Service ─────────────────────────────────────────────────
  - name: url-service
    url: http://url-service:8001
    connect_timeout: 5000
    write_timeout:   10000
    read_timeout:    10000
    retries: 3
    routes:
      - name: url-service-routes
        paths: ["/api/v1/urls"]
        methods: [GET, POST, PUT, DELETE]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute:        60          # 60 req/min for authenticated users
          hour:          1000
          policy:        redis
          redis_host:    redis
          redis_port:    6379
          limit_by:      consumer
          hide_client_headers: false
      - name: jwt
        config:
          secret_is_base64: false
          claims_to_verify: [exp]

  # ── Redirect Service ─────────────────────────────────────────────
  - name: redirect-service
    url: http://redirect-service:8002
    connect_timeout: 2000           # Tight timeout — hot path
    write_timeout:   3000
    read_timeout:    3000
    retries: 1                      # Don't retry redirects
    routes:
      - name: redirect-routes
        paths: ["/"]
        methods: [GET]
        strip_path: false
        regex_priority: 0
    plugins:
      - name: rate-limiting
        config:
          second: 100               # 100 req/sec per IP — anti-abuse
          policy: redis
          redis_host: redis
          redis_port: 6379
          limit_by: ip
          hide_client_headers: false

  # ── Analytics Service ────────────────────────────────────────────
  - name: analytics-service
    url: http://analytics-service:8003
    connect_timeout: 5000
    read_timeout:    30000          # Analytics queries can take longer
    routes:
      - name: analytics-api-routes
        paths: ["/api/v1/analytics"]
        methods: [GET]
        strip_path: false
      - name: analytics-ws-routes
        paths: ["/ws"]
        protocols: [ws, wss]        # WebSocket upgrade
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          policy: redis
          redis_host: redis
          redis_port: 6379
          limit_by: consumer

  # ── Auth Service ─────────────────────────────────────────────────
  - name: auth-service
    url: http://auth-service:8004
    connect_timeout: 5000
    routes:
      - name: auth-routes
        paths: ["/api/v1/auth"]
        methods: [GET, POST]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 20               # Strict limit on auth endpoints (brute force prevention)
          policy: redis
          redis_host: redis
          redis_port: 6379
          limit_by: ip

# ── Global Plugins (apply to all routes) ─────────────────────────
plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, DELETE, OPTIONS]
      headers: [Authorization, Content-Type, X-Request-ID]
      exposed_headers: [X-RateLimit-Limit, X-RateLimit-Remaining, Retry-After, X-Cache]
      max_age: 3600
      credentials: true

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true

  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid

  - name: request-termination
    config:
      status_code: 503
      message: "Service temporarily unavailable"
    enabled: false                 # Toggle on during maintenance

# ── Upstreams (load balancing) ────────────────────────────────────
upstreams:
  - name: redirect-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        interval: 5
        healthy:
          successes: 2
        unhealthy:
          http_failures: 3
          interval: 5
    targets:
      - target: redirect-service:8002
        weight: 100
