apiVersion: apps/v1
kind: Deployment
metadata:
  name: redirect-service
  namespace: url-shortener
  labels:
    app: redirect-service
spec:
  replicas: 10                   # Start higher — this is the hot path
  selector:
    matchLabels:
      app: redirect-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: redirect-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8002"
    spec:
      containers:
        - name: redirect-service
          image: ghcr.io/anwesha0425/redirect-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              value: "8002"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: dbname
            - name: REDIS_HOST
              value: "redis-service"
            - name: KAFKA_BROKERS
              value: "kafka-service:9092"
          resources:
            requests:
              cpu:    "500m"       # More CPU for the hot path
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redirect-service
  namespace: url-shortener
spec:
  selector:
    app: redirect-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: redirect-service-hpa
  namespace: url-shortener
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       redirect-service
  minReplicas: 10
  maxReplicas: 100               # Scale aggressively for traffic spikes
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 60  # Scale earlier than other services
